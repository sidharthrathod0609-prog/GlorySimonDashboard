<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#aa841c" />
      <stop offset="100%" stop-color="#c5a880" />
    </linearGradient>
  </defs>
  <!-- Rounded rectangle background with exact gold gradient -->
  <rect x="0" y="0" width="32" height="32" rx="7" fill="url(#gold-grad)" />
  <!-- Text "GS" centered -->
  <text x="16" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Outfit', 'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="15" fill="#07090e" text-anchor="middle" letter-spacing="-0.5">GS</text>
</svg>